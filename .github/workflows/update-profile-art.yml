name: Update profile art

on:
  schedule:
    - cron: "0 3 * * *"   # every day at 03:00 UTC
  workflow_dispatch: {}     # allows manual "Run workflow" trigger too

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest contribution data
        run: python scripts/fetch_contributions.py NominjinNomio data/contributions.json

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py data/contributions.json contrib-heatmap.svg

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: update contribution heatmap"
          git push
